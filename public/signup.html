<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Hostel Management</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    background:linear-gradient(135deg,#0f172a,#312e81,#2563eb);
    padding:30px 20px;
    overflow-y:auto;
}

body::before{
    content:'';
    position:fixed;
    width:300px;
    height:300px;
    background:#38bdf8;
    border-radius:50%;
    top:-100px;
    left:-100px;
    filter:blur(120px);
    z-index:-1;
}

body::after{
    content:'';
    position:fixed;
    width:300px;
    height:300px;
    background:#22c55e;
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(120px);
    z-index:-1;
}

.container{
    width:500px;
    max-width:100%;
    margin:20px 0;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    padding:35px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
    color:white;
}

h2{
    text-align:center;
    margin-bottom:30px;
    font-size:30px;
}

.input-group{
    margin-bottom:16px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    outline:none;
    font-size:15px;
}

.btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#22c55e,#16a34a);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(34,197,94,0.4);
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:bold;
}

.forgot-password{
    text-align:center;
    margin-top:15px;
}

.forgot-password a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:bold;
}

.error{
    color:#ff6b6b;
    text-align:center;
    margin-top:15px;
}

.success{
    color:#4ade80;
    text-align:center;
    margin-top:15px;
}

@media(max-width:600px){
    .container{
        padding:25px;
    }

    h2{
        font-size:24px;
    }
}
</style>
</head>

<body>

<div class="container">

<h2>Warden Registration</h2>

<form id="signupForm">

<div class="input-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="tel" id="phone" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" required>
</div>

<button type="submit" class="btn">Sign Up</button>

<div id="message"></div>

</form>

<div class="links">
Already have an account?
<a href="login.html">Login</a>
</div>

<div class="forgot-password">
<a href="#" onclick="forgotPassword()">Forgot Password?</a>
</div>

</div>

<script>
function forgotPassword(){
    let email = prompt("Enter your registered email:");

    if(email){
        alert("Password reset link sent to " + email + " ✅");
    }
}

document.getElementById("signupForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    let message = document.getElementById("message");

    if(password !== confirmPassword){
        message.className = "error";
        message.innerHTML = "Passwords do not match!";
        return;
    }

    try {
        const response = await fetch("/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name,
                email,
                phone,
                password
            })
        });

        const data = await response.json();

        if(response.ok){
            message.className = "success";
            message.innerHTML = "Registration Successful!";

            document.getElementById("signupForm").reset();

            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);

        } else {
            message.className = "error";
            message.innerHTML = data.message;
        }

    } catch(error){
        message.className = "error";
        message.innerHTML = "Server Error! Check if server is running.";
    }
});
</script>

</body>
</html>
