<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Management</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
}

/* Sidebar */
.sidebar{
    width:260px;
    height:100vh;
    background:#1e293b;
    padding:30px 20px;
    position:fixed;
    left:0;
    top:0;
}

.sidebar h2{
    color:#38bdf8;
    margin-bottom:40px;
    text-align:center;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin-bottom:12px;
    border-radius:12px;
}

.sidebar a:hover{
    background:#38bdf8;
}

/* Main Content */
.main-content{
    margin-left:260px;
    width:100%;
    padding:20px;
}

.header{
    position:relative;
    text-align:center;
    margin-bottom:20px;
}

h2{
    margin:0;
}

.logout-btn{
    position:absolute;
    right:0;
    top:0;
    width:120px;
    padding:12px;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}

button{
    padding:5px 10px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:darkred;
}

.add-room{
    margin-bottom:20px;
}

.add-room a{
    text-decoration:none;
    background:green;
    color:white;
    padding:10px 15px;
    border-radius:5px;
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🏠 HostelHub</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="students.html">Students</a>
    <a href="rooms.html">Rooms</a>
    <a href="allocation.html">Allocation</a>
    <a href="fees.html">Fees</a>
    <a href="mess.html">Mess</a>
    <a href="complaints.html">Complaints</a>
    <a href="events.html">Events</a>
</div>

<!-- Main Content -->
<div class="main-content">

    <div class="header">
        <h2>Room Management</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="add-room">
        <a href="add-room.html">+ Add Room</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Room Number</th>
                <th>Floor Number</th>
                <th>Room Type</th>
                <th>Capacity</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="roomTableBody"></tbody>
    </table>

</div>

<script src="room.js"></script>

<script>
function logout(){
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}
</script>

</body>
</html>
