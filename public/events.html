<!DOCTYPE html>
<html>
<head>
<title>Events Management</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    padding:20px;
}

.header{
    position:relative;
    text-align:center;
    margin-bottom:20px;
}

h2{
    margin:0;
}

.logout-btn{
    position:absolute;
    right:0;
    top:0;
    width:120px;
    padding:12px;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

form{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:30px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
}

#eventsList{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.event-card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.delete-btn{
    background:red;
    margin-top:15px;
}
</style>
</head>
<body>

<div class="header">
    <h2>Events Management</h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<form id="eventForm">
    <input type="text" id="title" placeholder="Event Title" required>

    <textarea id="description" placeholder="Description" required></textarea>

    <input type="date" id="date" required>

    <input type="time" id="time" required>

    <input type="text" id="venue" placeholder="Venue" required>

    <button type="submit">Add Event</button>
</form>

<div id="eventsList"></div>

<script src="events.js"></script>

<script>
function logout(){
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}
</script>

</body>
</html>
