<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Hostel Management</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#312e81,#2563eb);
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#38bdf8;
    border-radius:50%;
    top:-80px;
    left:-80px;
    filter:blur(120px);
}

body::after{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:#22c55e;
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(120px);
}

.wrapper{
    display:flex;
    width:950px;
    height:550px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(20px);
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.left{
    flex:1;
    color:white;
    padding:60px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.left h1{
    font-size:42px;
    margin-bottom:20px;
}

.left p{
    font-size:18px;
    line-height:1.8;
}

.right{
    width:420px;
    background:white;
    padding:40px;
}

.right h2{
    text-align:center;
    margin-bottom:30px;
    color:#111827;
}

.input-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
    outline:none;
    font-size:15px;
}

input:focus{
    border-color:#3b82f6;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    background:linear-gradient(90deg,#3b82f6,#06b6d4);
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(59,130,246,0.4);
}

.forgot-password{
    text-align:right;
    margin-top:12px;
}

.forgot-password a{
    color:#2563eb;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    color:#2563eb;
    text-decoration:none;
    font-weight:bold;
}

@media(max-width:900px){
    .wrapper{
        width:95%;
        flex-direction:column;
        height:auto;
    }

    .left{
        display:none;
    }

    .right{
        width:100%;
    }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="left">
    <h1>HostelHub Login</h1>
    <p>
        Access your hostel dashboard, manage rooms,
        complaints, fees and daily activities in one place.
    </p>
</div>

<div class="right">

<h2>Warden Login</h2>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter Email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password" required>
</div>

<button type="submit" class="btn">Login</button>

<div class="forgot-password">
    <a href="#" onclick="forgotPassword()">Forgot Password?</a>
</div>

</form>

<div class="links">
<p>
Don't have an account?
<a href="signup.html">Sign Up</a>
</p>
</div>

</div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(email && password){
        localStorage.setItem("currentUser", JSON.stringify({
            name: "Warden",
            email: email
        }));

        // directly redirect without alert
        window.location.href = "dashboard.html";
    } else {
        alert("Enter Email and Password");
    }
});
</script>

</body>
</html>
