<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Allocation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
}

/* Sidebar */
.sidebar{
    width:260px;
    height:100vh;
    background:#1e293b;
    padding:30px 20px;
    position:fixed;
    left:0;
    top:0;
}

.sidebar h2{
    color:#38bdf8;
    margin-bottom:40px;
    text-align:center;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
    margin-bottom:12px;
    border-radius:12px;
}

.sidebar a:hover{
    background:#38bdf8;
}

/* Main Content */
.main-content{
    margin-left:260px;
    width:100%;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.header{
    position:relative;
    text-align:center;
    margin-bottom:20px;
}

h2{
    margin:0;
}

.logout-btn{
    position:absolute;
    right:0;
    top:0;
    width:120px;
    padding:12px;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.form-box{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.allocate-btn{
    background:green;
    color:white;
}

.change-btn{
    background:orange;
    color:white;
}

.vacate-btn{
    background:red;
    color:white;
}

.delete-btn{
    background:#dc2626;
    color:white;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🏠 HostelHub</h2>

    <a href="dashboard.html">Dashboard</a>
    <a href="students.html">Students</a>
    <a href="rooms.html">Rooms</a>
    <a href="allocation.html">Allocation</a>
    <a href="fees.html">Fees</a>
    <a href="mess.html">Mess</a>
    <a href="complaints.html">Complaints</a>
    <a href="events.html">Events</a>
</div>

<!-- Main Content -->
<div class="main-content">

<div class="container">

    <div class="header">
        <h2>🛏️ Room Allocation</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="form-box">

        <input
            type="text"
            id="studentName"
            placeholder="Enter Student Name"
        >

        <input
            type="text"
            id="roomNumber"
            placeholder="Enter Room Number"
        >

        <button
            class="allocate-btn"
            onclick="allocateRoom()"
        >
            Allocate Room
        </button>

    </div>

    <table>
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Room Number</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="allocationTable"></tbody>
    </table>

</div>
</div>

<script src="allocation.js"></script>

<script>
function logout(){
    localStorage.removeItem("currentUser");
    window.location.href = "login.html";
}
</script>

</body>
</html>
